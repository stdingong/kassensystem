<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kassensystem</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f1; --bg3: #eeede9;
  --text: #1a1a1a; --text2: #666; --text3: #999;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --radius: 8px; --radius-lg: 12px;
  --green: #3B6D11; --green-bg: #EAF3DE;
  --blue: #185FA5; --blue-bg: #E6F1FB;
  --red: #A32D2D; --red-bg: #FCEBEB;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
    --text: #f0efe9; --text2: #9e9d97; --text3: #6b6a65;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --green: #97C459; --green-bg: #173404;
    --blue: #85B7EB; --blue-bg: #042C53;
    --red: #F09595; --red-bg: #501313;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }

/* LAYOUT */
.app { display: grid; grid-template-columns: 1fr 340px; min-height: 100vh; max-width: 1100px; margin: 0 auto; background: var(--bg); }
@media (max-width: 700px) { .app { grid-template-columns: 1fr; } .right { border-top: 0.5px solid var(--border); } }
.left { border-right: 0.5px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.right { display: flex; flex-direction: column; min-height: 0; }

/* TOPBAR */
.topbar { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 0.5px solid var(--border); align-items: center; flex-shrink: 0; }
.app-title { font-size: 15px; font-weight: 600; margin-right: 8px; }
.tab { padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all 0.15s; }
.tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-left: auto; flex-shrink: 0; }
.conn-dot.ok { background: var(--green); }
.conn-dot.err { background: var(--red); }

/* VIEWS */
.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* CATEGORY BAR */
.cat-bar { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.cat-btn { padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit; }
.cat-btn.active { background: var(--text); color: var(--bg); }

/* PRODUCTS GRID */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; padding: 12px; overflow-y: auto; flex: 1; align-content: start; }
.prod-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 8px; cursor: pointer; text-align: center; user-select: none; transition: border-color 0.15s, opacity 0.1s; }
.prod-card:hover { border-color: var(--border2); }
.prod-card:active { opacity: 0.6; }
.prod-icon { font-size: 24px; margin-bottom: 4px; }
.prod-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
.prod-price { font-size: 12px; color: var(--text2); }

/* CART */
.cart-header { padding: 12px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.cart-title { font-size: 13px; font-weight: 500; }
.cart-clear { font-size: 12px; color: var(--text2); cursor: pointer; background: none; border: none; font-family: inherit; }
.cart-items { flex: 1; overflow-y: auto; padding: 8px 12px; }
.cart-empty { color: var(--text3); font-size: 13px; text-align: center; margin-top: 40px; }
.cart-item { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
.cart-item-name { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.qty-btn { width: 22px; height: 22px; border-radius: 50%; border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--text); font-family: inherit; }
.qty-val { font-size: 13px; min-width: 18px; text-align: center; }
.cart-item-price { font-size: 12px; color: var(--text2); min-width: 48px; text-align: right; flex-shrink: 0; }

.cart-footer { padding: 12px; border-top: 0.5px solid var(--border); flex-shrink: 0; }
.total-tax { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.total-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 500; margin-bottom: 12px; }
.pay-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pay-btn { padding: 11px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; color: var(--text); transition: background 0.15s; }
.pay-btn:hover { background: var(--bg2); }
.pay-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.pay-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* PRODUCTS MGMT */
.mgmt-toolbar { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; flex-shrink: 0; align-items: center; }
.mgmt-toolbar input, .mgmt-toolbar select { font-family: inherit; font-size: 13px; padding: 6px 9px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); outline: none; }
.mgmt-toolbar input[type=text].name { flex: 1; min-width: 100px; }
.mgmt-toolbar input[type=number] { width: 80px; }
.mgmt-toolbar input.icon { width: 52px; }
.add-btn { padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-size: 13px; font-family: inherit; white-space: nowrap; }
.table-wrap { flex: 1; overflow-y: auto; }
.prod-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.prod-table th { text-align: left; padding: 8px 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); font-size: 12px; position: sticky; top: 0; background: var(--bg); }
.prod-table td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; line-height: 1; font-family: inherit; }
.del-btn:hover { color: var(--red); }
.cat-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: var(--bg2); color: var(--text2); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; flex-shrink: 0; }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 14px; }
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.section-head { padding: 10px 12px 4px; font-size: 12px; font-weight: 500; color: var(--text2); flex-shrink: 0; }
.tx-list-wrap { flex: 1; overflow-y: auto; padding: 0 12px 8px; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
.tx-info { font-size: 13px; min-width: 0; flex: 1; padding-right: 8px; }
.tx-names { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-time { font-size: 11px; color: var(--text3); margin-top: 1px; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 13px; font-weight: 500; }
.tx-method { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-top: 2px; }
.tx-cash { background: var(--green-bg); color: var(--green); }
.tx-card { background: var(--blue-bg); color: var(--blue); }
.reset-btn { margin: 8px 12px 12px; padding: 9px; border-radius: var(--radius); border: 0.5px solid var(--red); background: none; color: var(--red); cursor: pointer; font-size: 13px; font-family: inherit; width: calc(100% - 24px); flex-shrink: 0; }
.reset-btn:hover { background: var(--red-bg); }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 24px; width: 280px; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.modal-total { font-size: 28px; font-weight: 600; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 11px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 14px; font-family: inherit; color: var(--text); }
.modal-btn.confirm { background: var(--text); color: var(--bg); border-color: var(--text); }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 300; transition: transform 0.25s; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

.loading { color: var(--text3); font-size: 13px; text-align: center; padding: 24px; }
</style>
</head>
<body>

<div class="app">
  <!-- LEFT -->
  <div class="left">
    <div class="topbar">
      <span class="app-title">🧾 Kasse</span>
      <button class="tab active" onclick="switchView('pos')">Kasse</button>
      <button class="tab" onclick="switchView('products')">Produkte</button>
      <button class="tab" onclick="switchView('stats')">Statistik</button>
      <div class="conn-dot" id="conn-dot" title="Verbindungsstatus"></div>
    </div>

    <!-- POS -->
    <div class="view active" id="view-pos">
      <div class="cat-bar" id="cat-bar"></div>
      <div class="products-grid" id="products-grid"><div class="loading">Laden…</div></div>
    </div>

    <!-- PRODUCTS MGMT -->
    <div class="view" id="view-products">
      <div class="mgmt-toolbar">
        <input class="name" type="text" id="new-name" placeholder="Produktname" />
        <input type="number" id="new-price" placeholder="Preis €" step="0.01" min="0" />
        <input class="icon" type="text" id="new-icon" placeholder="🛍️" maxlength="2" />
        <select id="new-cat">
          <option>Getränke</option>
          <option>Essen</option>
          <option>Sonstiges</option>
        </select>
        <button class="add-btn" onclick="addProduct()">+ Hinzufügen</button>
      </div>
      <div class="table-wrap">
        <table class="prod-table">
          <thead><tr><th></th><th>Name</th><th>Preis</th><th>Kategorie</th><th></th></tr></thead>
          <tbody id="prod-tbody"><tr><td colspan="5" class="loading">Laden…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- STATS -->
    <div class="view" id="view-stats">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-label">Umsatz heute</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Transaktionen</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Bargeld</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Karte</div><div class="stat-value">—</div></div>
      </div>
      <div class="section-head">Transaktionen heute</div>
      <div class="tx-list-wrap" id="tx-list"><div class="loading">Laden…</div></div>
      <button class="reset-btn" onclick="resetDay()">Tagesabschluss durchführen</button>
    </div>
  </div>

  <!-- RIGHT: CART -->
  <div class="right">
    <div class="cart-header">
      <span class="cart-title">Warenkorb</span>
      <button class="cart-clear" onclick="clearCart()">Leeren</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">Noch keine Artikel</div>
    </div>
    <div class="cart-footer">
      <div class="total-tax" id="total-tax">inkl. 19% MwSt: 0,00 €</div>
      <div class="total-row"><span>Gesamt</span><span id="total-val">0,00 €</span></div>
      <div class="pay-btns">
        <button class="pay-btn" id="btn-cash" onclick="checkout('Bargeld')" disabled>Bargeld</button>
        <button class="pay-btn primary" id="btn-card" onclick="checkout('Karte')" disabled>Karte</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Zahlung</h3>
    <p id="modal-sub">Betrag bestätigen</p>
    <div class="modal-total" id="modal-total">0,00 €</div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">Abbrechen</button>
      <button class="modal-btn confirm" onclick="confirmPayment()">Bestätigen ✓</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let products = [];
let cart = [];
let currentCat = 'Alle';
let pendingMethod = '';

function fmt(n) { return Number(n).toFixed(2).replace('.', ',') + ' €'; }

function toast(msg, dur = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setConn(ok) {
  const d = document.getElementById('conn-dot');
  d.className = 'conn-dot ' + (ok ? 'ok' : 'err');
  d.title = ok ? 'Verbunden' : 'Keine Verbindung';
}

// ── API CALLS ──────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!res.ok) throw new Error(await res.text());
    setConn(true);
    return await res.json();
  } catch (e) {
    setConn(false);
    throw e;
  }
}

// ── PRODUCTS ──────────────────────────────────────────────────

async function loadProducts() {
  try {
    products = await apiFetch('/api/products');
    renderCatBar();
    renderProducts();
    renderProdTable();
  } catch {
    document.getElementById('products-grid').innerHTML = '<p class="loading">Verbindungsfehler</p>';
  }
}

function getCategories() {
  return ['Alle', ...new Set(products.map(p => p.category))];
}

function renderCatBar() {
  document.getElementById('cat-bar').innerHTML = getCategories().map(c =>
    `<button class="cat-btn${c === currentCat ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) { currentCat = c; renderCatBar(); renderProducts(); }

function renderProducts() {
  const list = currentCat === 'Alle' ? products : products.filter(p => p.category === currentCat);
  document.getElementById('products-grid').innerHTML = list.length
    ? list.map(p => `<div class="prod-card" onclick="addToCart(${p.id})">
        <div class="prod-icon">${p.icon}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-price">${fmt(p.price)}</div>
      </div>`).join('')
    : '<p class="loading">Keine Produkte</p>';
}

function renderProdTable() {
  document.getElementById('prod-tbody').innerHTML = products.length
    ? products.map(p => `<tr>
        <td style="font-size:20px;">${p.icon}</td>
        <td>${p.name}</td>
        <td>${fmt(p.price)}</td>
        <td><span class="cat-badge">${p.category}</span></td>
        <td><button class="del-btn" onclick="deleteProduct(${p.id})">×</button></td>
      </tr>`).join('')
    : '<tr><td colspan="5" class="loading">Keine Produkte</td></tr>';
}

async function addProduct() {
  const name = document.getElementById('new-name').value.trim();
  const price = parseFloat(document.getElementById('new-price').value);
  const icon = document.getElementById('new-icon').value.trim() || '📦';
  const category = document.getElementById('new-cat').value;
  if (!name || isNaN(price) || price < 0) { toast('Bitte Name und Preis eingeben'); return; }
  try {
    await apiFetch('/api/products', { method: 'POST', body: JSON.stringify({ name, price, category, icon }) });
    document.getElementById('new-name').value = '';
    document.getElementById('new-price').value = '';
    document.getElementById('new-icon').value = '';
    await loadProducts();
    toast('Produkt hinzugefügt ✓');
  } catch { toast('Fehler beim Speichern'); }
}

async function deleteProduct(id) {
  if (!confirm('Produkt löschen?')) return;
  try {
    await apiFetch('/api/products/' + id, { method: 'DELETE' });
    cart = cart.filter(c => c.id !== id);
    renderCart();
    await loadProducts();
    toast('Produkt gelöscht');
  } catch { toast('Fehler beim Löschen'); }
}

// ── CART ──────────────────────────────────────────────────────

function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++;
  else cart.push({ ...p, qty: 1 });
  renderCart();
}

function changeQty(id, delta) {
  const i = cart.findIndex(x => x.id === id);
  if (i < 0) return;
  cart[i].qty += delta;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  renderCart();
}

function clearCart() { cart = []; renderCart(); }

function renderCart() {
  const el = document.getElementById('cart-items');
  if (cart.length === 0) {
    el.innerHTML = '<div class="cart-empty">Noch keine Artikel</div>';
  } else {
    el.innerHTML = cart.map(item => `
      <div class="cart-item">
        <span class="cart-item-name">${item.icon} ${item.name}</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <span class="cart-item-price">${fmt(item.price * item.qty)}</span>
      </div>`).join('');
  }
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = total - total / 1.19;
  document.getElementById('total-val').textContent = fmt(total);
  document.getElementById('total-tax').textContent = 'inkl. 19% MwSt: ' + fmt(tax);
  const hasItems = cart.length > 0;
  document.getElementById('btn-cash').disabled = !hasItems;
  document.getElementById('btn-card').disabled = !hasItems;
}

// ── CHECKOUT ──────────────────────────────────────────────────

function checkout(method) {
  if (cart.length === 0) return;
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  pendingMethod = method;
  document.getElementById('modal-title').textContent = 'Zahlung per ' + method;
  document.getElementById('modal-sub').textContent = method === 'Bargeld' ? 'Bargeld eingenommen?' : 'Kartenzahlung bestätigen?';
  document.getElementById('modal-total').textContent = fmt(total);
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

async function confirmPayment() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const items = cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty, icon: i.icon }));
  closeModal();
  try {
    await apiFetch('/api/transactions', {
      method: 'POST',
      body: JSON.stringify({ total, method: pendingMethod, items })
    });
    cart = [];
    renderCart();
    toast('Zahlung erfasst ✓');
  } catch { toast('Fehler beim Speichern der Transaktion'); }
}

// ── STATS ──────────────────────────────────────────────────────

async function loadStats() {
  try {
    const [stats, txs] = await Promise.all([
      apiFetch('/api/stats'),
      apiFetch('/api/transactions')
    ]);
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Umsatz heute</div><div class="stat-value">${fmt(stats.total)}</div><div class="stat-sub">${stats.count} Transaktionen</div></div>
      <div class="stat-card"><div class="stat-label">Ø Bon</div><div class="stat-value">${fmt(stats.count > 0 ? stats.total / stats.count : 0)}</div></div>
      <div class="stat-card"><div class="stat-label">Bargeld</div><div class="stat-value">${fmt(stats.cash)}</div></div>
      <div class="stat-card"><div class="stat-label">Karte</div><div class="stat-value">${fmt(stats.card)}</div></div>
    `;
    const txEl = document.getElementById('tx-list');
    txEl.innerHTML = txs.length
      ? txs.map(t => `
        <div class="tx-item">
          <div class="tx-info">
            <div class="tx-names">${t.items.map(i => i.name).join(', ')}</div>
            <div class="tx-time">${t.created_at}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount">${fmt(t.total)}</div>
            <span class="tx-method ${t.method === 'Bargeld' ? 'tx-cash' : 'tx-card'}">${t.method}</span>
          </div>
        </div>`).join('')
      : '<p class="loading">Noch keine Transaktionen heute</p>';
  } catch { toast('Statistik konnte nicht geladen werden'); }
}

async function resetDay() {
  if (!confirm('Tagesabschluss durchführen? Alle heutigen Transaktionen werden gelöscht.')) return;
  try {
    await apiFetch('/api/transactions/today', { method: 'DELETE' });
    await loadStats();
    toast('Tagesabschluss durchgeführt ✓');
  } catch { toast('Fehler beim Tagesabschluss'); }
}

// ── VIEWS ──────────────────────────────────────────────────────

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  ['pos', 'products', 'stats'].forEach((name, i) => {
    if (name === v) document.querySelectorAll('.tab')[i].classList.add('active');
  });
  if (v === 'stats') loadStats();
}

// ── WEBSOCKET LIVE SYNC ────────────────────────────────────────

function currentView() {
  if (document.getElementById('view-stats').classList.contains('active')) return 'stats';
  if (document.getElementById('view-products').classList.contains('active')) return 'products';
  return 'pos';
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => setConn(true);

  ws.onmessage = (e) => {
    const { event } = JSON.parse(e.data);
    if (event === 'transaction') {
      if (currentView() === 'stats') loadStats();
      flashLive();
    }
    if (event === 'products_changed') {
      loadProducts();
    }
    if (event === 'reset') {
      if (currentView() === 'stats') loadStats();
    }
  };

  ws.onclose = () => {
    setConn(false);
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function flashLive() {
  const dot = document.getElementById('conn-dot');
  dot.style.transform = 'scale(1.8)';
  setTimeout(() => dot.style.transform = '', 400);
}

// ── INIT ───────────────────────────────────────────────────────
loadProducts();
connectWS();
</script>
</body>
</html>
