<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.json"/>
<title>Kassensystem</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* exact colors from screenshot */
  --bg-nav:     #2a2018;
  --bg-left:    #f2e8d5;
  --bg-card:    #faf4e8;
  --bg-card2:   #f5ede0;
  --bg-side:    #ede1cc;
  --bg-np:      #e0d4bc;
  --bg-npbtn:   #f5ede0;
  --bg-billbtn: #faf4e8;
  --text:       #1a1208;
  --text2:      #5a4020;
  --text3:      #9a8060;
  --border:     rgba(140,100,50,0.2);
  --border2:    rgba(140,100,50,0.35);
  --accent:     #c8860a;
  --green:      #1a7a3a;
  --red:        #c0392b;
  --shadow-card: 0 2px 6px rgba(100,70,20,0.15);
  --shadow-btn:  0 2px 4px rgba(0,0,0,0.12);
}

html,body{height:100%;overflow:hidden;touch-action:manipulation;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg-nav);
  color:var(--text);
  display:flex;
  flex-direction:column;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ════════════════════════════════════════
   TOP NAV  (matches dark bar in screenshot)
════════════════════════════════════════ */
.topnav{
  height:52px;
  background:var(--bg-nav);
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:6px;
  flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,0.5);
}
.nav-logo{font-size:22px;margin-right:4px;}
.floor-tab{
  height:36px;
  padding:0 18px;
  border-radius:7px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.6);
  font-size:15px;
  font-family:inherit;
  cursor:pointer;
  display:flex;align-items:center;gap:7px;
  font-weight:500;
  transition:all .15s;
}
.floor-tab.active{
  background:rgba(255,255,255,0.18);
  color:#fff;
  font-weight:700;
  border-bottom:3px solid var(--accent);
}
.nav-spacer{flex:1;}
.nav-right{display:flex;align-items:center;gap:6px;}
.nav-action{
  height:36px;
  padding:0 14px;
  border-radius:7px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.8);
  font-size:14px;
  font-family:inherit;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  font-weight:600;
  transition:all .15s;
}
.nav-action:active{background:rgba(255,255,255,0.2);}
.nav-fs{padding:0;width:36px;font-size:18px;}
.conn-dot{width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s;margin-left:4px;}
.conn-dot.ok{background:#4ade80;}
.conn-dot.err{background:#f87171;}

/* ════════════════════════════════════════
   MAIN AREA
════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ════════════════════════════════════════
    LEFT  – products (60%)
════════════════════════════════════════ */
.left {
  flex: 60;              /* Nimmt 60 Anteile des verfügbaren Platzes */
  display: flex;
  flex-direction: column;
  background: var(--bg-left);
  overflow: hidden;
  min-width: 0;
}

/* Floor heading */
.floor-head{
  padding:10px 16px 8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  border-bottom:1px solid var(--border2);
}
.floor-head-icon{font-size:26px;}
.floor-head-name{font-size:20px;font-weight:800;color:var(--text);}

/* Category pills */
.cat-bar{
  display:flex;
  gap:7px;
  padding:8px 14px;
  flex-wrap:wrap;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:var(--bg-left);
}
.cat-pill{
  height:34px;
  padding:0 18px;
  border-radius:17px;
  border:1.5px solid var(--border2);
  background:var(--bg-card2);
  color:var(--text2);
  font-size:14px;
  font-family:inherit;
  cursor:pointer;
  font-weight:600;
  transition:all .1s;
}
.cat-pill.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}

/* Product grid – 5 columns like screenshot */
.prod-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
  padding:12px 14px;
  overflow-y:auto;
  flex:1;
  align-content:start;
}

/* Product card – exact look from screenshot */
.prod-card{
  background:var(--bg-card);
  border:1px solid var(--border2);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow-card);
  transition:transform .1s;
  font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.prod-card:active{transform:scale(.92);}

/* Image area – beige background like screenshot */
.prod-img{
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-card);
  padding:6px;
  flex-shrink:0;
}
.prod-img img{
  width:80px;
  height:80px;
  object-fit:contain;
  image-rendering:auto;
}
.prod-img-emoji{
  font-size:62px;
  line-height:1;
}

/* Dark footer bar – exact match to screenshot */
.prod-foot{
  background:#3d2e1a;
  padding:7px 8px 8px;
  text-align:center;
}
.prod-foot-name{
  font-size:13px;
  font-weight:600;
  color:#f0e0c0;
  line-height:1.2;
  margin-bottom:2px;
}
.prod-foot-price{
  font-size:14px;
  font-weight:800;
  color:#e8c880;
}

/* ════════════════════════════════════════
    RIGHT – sidebar (40%)
════════════════════════════════════════ */
.right {
  flex: 40;              /* Nimmt 40 Anteile des verfügbaren Platzes */
  /* width: 320px; <-- Diese Zeile muss weg! */
  display: flex;
  flex-direction: column;
  background: var(--bg-side);
  border-left: 1.5px solid var(--border2);
  overflow: hidden;
  min-width: 0;          /* Wichtig, damit der Inhalt nicht rausdrückt */
}
/* ── Cart ── */
.cart-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px 6px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.cart-title{font-size:17px;font-weight:800;color:var(--text);}
.cart-clear{
  font-size:13px;
  color:var(--accent);
  background:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
}
.cart-list{
  flex:1;
  overflow-y:auto;
  padding:4px 12px;
  min-height:0;
}
.cart-empty{color:var(--text3);font-size:14px;text-align:center;padding:20px 0;}

.cart-row{
  display:flex;
  align-items:center;
  gap:6px;
  padding:7px 0;
  border-bottom:1px solid var(--border);
}
.ci{font-size:20px;flex-shrink:0;}
.cn{flex:1;font-size:18px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.qb{
  width:30px;height:30px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  background:var(--bg-npbtn);
  cursor:pointer;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);
  font-family:inherit;
  flex-shrink:0;
}
.qn{font-size:15px;font-weight:800;min-width:20px;text-align:center;color:var(--text);}
.cs{font-size:12px;color:var(--text3);min-width:48px;text-align:right;flex-shrink:0;}

/* ── Totals ── */
.total-block{
  padding:8px 14px 6px;
  border-top:1.5px solid var(--border2);
  flex-shrink:0;
}
.total-tax{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--text3);
  margin-bottom:2px;
}
.total-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
}
.total-label{font-size:16px;font-weight:700;color:var(--text2);}
.total-val{font-size:26px;font-weight:900;color:var(--accent);}

/* ── Payment area ── */
.pay-area{
  flex-shrink:0;
  background:var(--bg-np);
  border-top:1.5px solid var(--border2);
  padding:6px 10px 8px;
}

/* Given / Rückgeld */
.gr-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
  margin-bottom:6px;
}
.gr-box{
  background:var(--bg-npbtn);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:5px 12px;
  display:flex;
  flex-direction:column;
  gap:1px;
}
.gr-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.gr-val{font-size:20px;font-weight:900;color:var(--text);line-height:1.1;}

/* Numpad + Bills side by side */
.np-bills{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:5px;
  margin-bottom:6px;
}
.numpad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}
.np{
  height:40px;
  border-radius:7px;
  border:1px solid var(--border2);
  background:var(--bg-npbtn);
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  color:var(--text);
  box-shadow:var(--shadow-btn);
  transition:all .08s;
  display:flex;align-items:center;justify-content:center;
}
.np:active{transform:scale(.9);background:var(--bg-np);}
.np-del{background:var(--bg-np);font-size:16px;}

/* Bill buttons */
.bills{
  display:grid;
  grid-template-rows:repeat(4,1fr);
  gap:4px;
}
.bill{
  border-radius:7px;
  border:1.5px solid #c8a040;
  background:#fdf5d5;
  color:#7a5500;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-btn);
  transition:all .08s;
  min-height:40px;
}
.bill:active{transform:scale(.9);}
.bill.sel{background:var(--accent);border-color:#8a5500;color:#fff;}

/* Pay buttons */
.pay-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.pay-btn{
  height:46px;
  border-radius:9px;
  border:none;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:var(--shadow-btn);
  transition:all .1s;
}
.pay-btn:active{transform:scale(.95);}
.pay-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.pay-cash  {background:#6b4010;color:#fff;}
.pay-paypal{background:#003087;color:#fff;}

/* change indicator */
.change-hint{
  border-radius:8px;
  padding:5px 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
  font-weight:700;
}
.change-hint.ok  {background:#d1fae5;color:#065f46;}
.change-hint.bad {background:#fee2e2;color:#991b1b;}

/* ════════════════════════════════════════
   SCREENS
════════════════════════════════════════ */
.screen{display:none;flex:1;min-height:0;}
.screen.active{display:flex;}
#screen-pos{flex-direction:row;}

/* Stats / Admin full page */
.page-wrap{
  flex:1;
  overflow-y:auto;
  padding:20px 24px;
  background:var(--bg-left);
}

/* Stats */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--bg-card);border:1px solid var(--border2);border-radius:12px;padding:16px;box-shadow:var(--shadow-card);}
.kpi-lbl{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.kpi-val{font-size:24px;font-weight:900;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.chart-box{background:var(--bg-card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow-card);}
.chart-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:10px;}
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:60px;}
.mc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mc-bar{width:100%;border-radius:3px 3px 0 0;transition:height .4s;}
.mc-lbl{font-size:9px;color:var(--text3);white-space:nowrap;}
.sec{font-size:13px;font-weight:800;color:var(--text2);margin:18px 0 10px;text-transform:uppercase;letter-spacing:.5px;}
.floor-row{background:var(--bg-card);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;box-shadow:var(--shadow-card);}
.rank-card{background:var(--bg-card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow-card);}
.rank-item{margin-bottom:12px;}
.rank-item:last-child{margin-bottom:0;}
.rank-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.rank-left{display:flex;align-items:center;gap:8px;}
.rank-n{font-size:12px;color:var(--text3);font-weight:700;min-width:22px;}
.rank-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.rank-bar{height:100%;border-radius:3px;transition:width .6s;}
.prod-chart{background:var(--bg-card);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow-card);}
.reset-stat{width:100%;margin-top:20px;padding:14px;border-radius:10px;border:1.5px solid var(--red);background:none;color:var(--red);font-size:14px;font-family:inherit;cursor:pointer;font-weight:700;}
.reset-stat:hover{background:#fee2e2;}

/* Admin */
.admin-sec{margin-bottom:28px;}
.admin-title{font-size:16px;font-weight:800;padding-bottom:10px;border-bottom:2px solid var(--accent);margin-bottom:14px;}
.admin-form{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
.admin-form input{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg-card);color:var(--text);outline:none;}
.fw{flex:1;min-width:120px;}
.fn{width:88px;}
.fi{width:58px;}
.admin-add{padding:9px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;}
table.t{width:100%;border-collapse:collapse;font-size:14px;}
table.t th{text-align:left;padding:9px 12px;font-size:12px;font-weight:700;color:var(--text3);border-bottom:1.5px solid var(--border2);text-transform:uppercase;letter-spacing:.4px;}
table.t td{padding:9px 12px;border-bottom:1px solid var(--border);}
.td{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;}
.td:hover{color:var(--red);}
.ctag{background:var(--bg-np);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600;color:var(--text2);}
.s-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.s-row label{font-size:13px;color:var(--text2);min-width:140px;font-weight:600;}
.s-row input{flex:1;min-width:110px;font-family:inherit;font-size:14px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg-card);color:var(--text);outline:none;}
.s-save{padding:9px 18px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg-np);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;}

/* ════════════════════════════════════════
   MODALS
════════════════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:800;align-items:center;justify-content:center;}
.overlay.show{display:flex;}

.pin-box{background:var(--bg-card);border-radius:16px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.pin-box h3{font-size:20px;font-weight:800;margin-bottom:6px;}
.pin-box p{font-size:14px;color:var(--text3);margin-bottom:18px;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:8px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);}
.pin-dot.on{background:var(--accent);border-color:var(--accent);}
.pin-err{font-size:13px;color:var(--red);min-height:20px;margin-bottom:10px;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{padding:18px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg-np);cursor:pointer;font-size:22px;font-weight:700;font-family:inherit;color:var(--text);transition:all .08s;}
.pin-btn:active{background:var(--bg-np);}
.pin-sm{font-size:15px;}

.admin-modal{background:var(--bg-card);border-radius:16px;padding:32px 28px;width:340px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.admin-modal h3{font-size:20px;font-weight:800;margin-bottom:6px;}
.admin-modal p{font-size:14px;color:var(--text3);margin-bottom:16px;}
.m-input{width:100%;font-family:inherit;font-size:16px;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg-left);color:var(--text);margin-bottom:8px;outline:none;}
.m-err{font-size:13px;color:var(--red);min-height:20px;margin-bottom:10px;}
.m-btns{display:flex;gap:10px;}
.m-btn{flex:1;padding:13px;border-radius:10px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:15px;font-family:inherit;color:var(--text);font-weight:600;}
.m-btn.ok{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Pfand buttons */
.pfand-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:5px 10px;
  flex-shrink:0;
  border-top:1.5px solid var(--border2);
}
.pfand-btn{
  border-radius:9px;
  border:2px solid;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:6px 6px;
  line-height:1.2;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:.3px;
  box-shadow:var(--shadow-btn);
  transition:all .1s;
}
.pfand-btn:active{transform:scale(.95);}
.pfand-btn-icon{font-size:18px;line-height:1;}
.pfand-btn-label{font-size:11px;}
.pfand-btn-price{font-size:10px;font-weight:700;opacity:.85;}
.pfand-vergabe  {background:#d1fae5;border-color:#059669;color:#065f46;}
.pfand-rueckgabe{background:#fee2e2;border-color:#dc2626;color:#991b1b;}

/* Pfand cart rows */
.pfand-cs-pos{font-size:12px;color:var(--green);min-width:48px;text-align:right;flex-shrink:0;font-weight:700;}
.pfand-cs-neg{font-size:12px;color:var(--red);min-width:48px;text-align:right;flex-shrink:0;font-weight:700;}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:#1a1208;color:#fff;padding:13px 28px;border-radius:24px;font-size:15px;font-weight:700;z-index:900;transition:transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ════════════════════════════════════════
   PORTRAIT TAB BAR  (only shown in portrait)
════════════════════════════════════════ */
.portrait-tabbar{
  display:none;
  flex-shrink:0;
  background:var(--bg-nav);
  border-bottom:2px solid rgba(0,0,0,.4);
}
.ptab{
  height:48px;
  border:none;
  background:transparent;
  color:rgba(255,255,255,.55);
  font-size:15px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  border-bottom:3px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.ptab.active{
  background:rgba(255,255,255,.13);
  color:#fff;

/* ════════════════════════════════════════
   TABLET / SMALL-SCREEN LAYOUT
   Greift auf iPads aller Größen (quer + hoch)
   und auf Bildschirmen ≤ 1200 px Breite
════════════════════════════════════════ */

}

<script>
/* ── EMOJI-TO-IMAGE lookup via Twemoji CDN ──────────────────── */
/* We use Google's Noto Emoji or OpenMoji for realistic drink images */
const PROD_IMAGES = {
  /* ── Kellerbar ── */
  'Helles':           'https://em-content.zobj.net/source/google/387/beer-mug_1f37a.png',
  'Radler':           'https://em-content.zobj.net/source/google/387/lemon_1f34b.png',

  'Äppler Flasche':   'https://em-content.zobj.net/source/google/387/green-apple_1f34f.png',
  'Softdrink':        'https://em-content.zobj.net/source/google/387/cup-with-straw_1f964.png',
  'Sekt':             'https://em-content.zobj.net/source/google/387/champagne-glass_1f942.png',
  'Weißwein':         'https://em-content.zobj.net/source/google/387/wine-glass_1f377.png',
  'Rotling':          'https://em-content.zobj.net/source/google/387/wine-glass_1f377.png',
  'Sekt Mate':        'https://em-content.zobj.net/source/google/387/champagne-glass_1f942.png',
  'Vodka Mate':       'https://em-content.zobj.net/source/google/387/tropical-drink_1f379.png',
  'Vodka Bull':       'https://em-content.zobj.net/source/google/387/tropical-drink_1f379.png',
  'Shot':             'https://em-content.zobj.net/source/google/387/tumbler-glass_1f943.png',
  'Blind Shot':       'https://em-content.zobj.net/source/google/387/tumbler-glass_1f943.png',
  'Sekt Flasche':     'https://em-content.zobj.net/source/google/387/bottle-with-popping-cork_1f37e.png',
  'Pfeffi Flasche':   'https://em-content.zobj.net/source/google/387/herb_1f33f.png',
  'Bierpong':         'https://em-content.zobj.net/source/google/387/beer-mug_1f37a.png',
  /* ── Erdgeschossbar ── */
  'Äppler':           'https://em-content.zobj.net/source/google/387/green-apple_1f34f.png',
  'Prosecco':         'https://em-content.zobj.net/source/google/387/bottle-with-popping-cork_1f37e.png',
  'Wein rot':         'https://em-content.zobj.net/source/google/387/wine-glass_1f377.png',
  'Matte':            'https://em-content.zobj.net/source/google/387/beverage-box_1f9c3.png',
  'Cola':             'https://em-content.zobj.net/source/google/387/cup-with-straw_1f964.png',
  'Orangensaft':      'https://em-content.zobj.net/source/google/387/tangerine_1f34a.png',
  'Wasser':           'https://em-content.zobj.net/source/google/387/droplet_1f4a7.png',
};

const FLOORS = {
  keller:{ id:'keller', name:'Kellerbar',     emoji:'🍺', color:'#c8860a' },
  erd:   { id:'erd',    name:'Erdgeschossbar', emoji:'🥂', color:'#6d28d9' },
};
const CHART_COLORS = ['#c8860a','#6d28d9','#0e7490','#065f46','#9f1239','#1d4ed8','#d97706'];

let products  = {keller:[],erd:[]};
let carts     = {keller:[],erd:[]};
let pfands    = {keller:{vergabe:0,rueckgabe:0}, erd:{vergabe:0,rueckgabe:0}};
let floor     = 'keller';
let activeCat = 'Alle';
let npRaw     = '';
let pinUnlocked=false, adminUnlocked=false, adminPwCache='', pinCb=null, pinVal='';

const PFAND_PRICE = 1.00;

const fmt = n => Number(n).toFixed(2).replace('.',',') + ' €';

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2600);
}
function setConn(ok){document.getElementById('conn-dot').className='conn-dot '+(ok?'ok':'err');}

async function api(url,opts={}){
  try{
    const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});
    if(!r.ok) throw new Error(await r.text());
    setConn(true); return r.json();
  }catch(e){setConn(false);throw e;}
}

/* ── screens ── */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='stats') loadStats();
  if(name==='admin') loadAdmin();
}

/* ── floor ── */
function switchFloor(id){
  floor=id; activeCat='Alle'; npRaw='';
  const f=FLOORS[id];
  document.getElementById('fh-icon').textContent=f.emoji;
  document.getElementById('fh-name').textContent=f.name;
  Object.keys(FLOORS).forEach(fid=>{
    document.getElementById('tab-'+fid)?.classList.toggle('active',fid===id);
  });
  renderCats(); renderProducts(); renderCart(); updateDisplay(); switchPortraitTab('products');
}

/* ── products ── */
async function loadProducts(fid){
  try{ products[fid]=await api('/api/products?floor='+fid); if(floor===fid){renderCats();renderProducts();} }catch(e){console.error(e);}
}
async function loadAllProducts(){ await Promise.all(Object.keys(FLOORS).map(id=>loadProducts(id))); }

function productImgHtml(name,icon){
  const url=PROD_IMAGES[name];
  if(url) return `<img src="${url}" alt="${name}" onerror="this.parentElement.innerHTML='<span class=prod-img-emoji>${icon}</span>'"/>`;
  return `<span class="prod-img-emoji">${icon}</span>`;
}

function renderCats(){
  const cats=['Alle',...new Set((products[floor]||[]).map(p=>p.category))];
  document.getElementById('cat-bar').innerHTML=cats.map(c=>`
    <button class="cat-pill${c===activeCat?' active':''}" onclick="setCat(this,'${c.replace(/'/g,"\\'")}')">
      ${c}
    </button>`).join('');
}

function setCat(btn,c){
  activeCat=c;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.toggle('active',b===btn));
  renderProducts();
}

function renderProducts(){
  const list=(products[floor]||[]).filter(p=>activeCat==='Alle'||p.category===activeCat);
  const grid=document.getElementById('prod-grid');
  if(!list.length){grid.innerHTML='<p style="color:var(--text3);padding:24px;font-size:15px">Keine Produkte</p>';return;}
  grid.innerHTML=list.map(p=>`
    <button class="prod-card" onclick="addToCart(${p.id})">
      <div class="prod-img">${productImgHtml(p.name,p.icon)}</div>
      <div class="prod-foot">
        <div class="prod-foot-name">${p.name}</div>
        <div class="prod-foot-price">${fmt(p.price)}</div>
      </div>
    </button>`).join('');
}

/* ── cart ── */
function getItemsTotal(){ return (carts[floor]||[]).reduce((s,i)=>s+i.price*i.qty,0); }
function getPfandTotal(){ const p=pfands[floor]; return (p.vergabe-p.rueckgabe)*PFAND_PRICE; }
function getTotal(){ return getItemsTotal()+getPfandTotal(); }

function addPfand(type){ pfands[floor][type]++; renderCart(); updateDisplay(); }
function changePfand(type,d){ pfands[floor][type]=Math.max(0,pfands[floor][type]+d); renderCart(); updateDisplay(); }

function addToCart(id){
  const p=(products[floor]||[]).find(x=>x.id===id); if(!p) return;
  const c=carts[floor], ex=c.find(x=>x.id===id);
  if(ex) ex.qty++; else c.push({...p,qty:1});
  renderCart(); updateDisplay();
}

function changeQty(id,d){
  const c=carts[floor], i=c.findIndex(x=>x.id===id); if(i<0) return;
  c[i].qty+=d; if(c[i].qty<=0) c.splice(i,1);
  renderCart(); updateDisplay();
}

function clearCart(){carts[floor]=[]; pfands[floor]={vergabe:0,rueckgabe:0}; npRaw=''; renderCart(); updateDisplay();}

function renderCart(){
  const cart=carts[floor]||[];
  const p=pfands[floor];
  const itemsTotal=getItemsTotal(), pfandNet=getPfandTotal(), total=getTotal();
  const tax=itemsTotal-itemsTotal/1.19;
  const hasAnything=cart.length>0||p.vergabe>0||p.rueckgabe>0;

  document.getElementById('total-val').textContent=fmt(total);
  document.getElementById('total-tax').innerHTML=
    `inkl. 19% MwSt: ${fmt(tax)}&nbsp;&nbsp;&nbsp;&nbsp;P: 0% Pfand`;
  document.getElementById('btn-cash').disabled=!hasAnything;
  document.getElementById('btn-paypal').disabled=!hasAnything;

  // Portrait cart tab badge
  const badgeCount=cart.reduce((s,i)=>s+i.qty,0)+p.vergabe+p.rueckgabe;
  const badge=document.getElementById('cart-tab-badge');
  if(badge){badge.textContent=badgeCount||'';badge.classList.toggle('has-items',badgeCount>0);}

  const el=document.getElementById('cart-list');
  if(!hasAnything){el.innerHTML='<p class="cart-empty">Noch keine Artikel</p>';return;}

  let html=cart.map(item=>`
    <div class="cart-row">
      <span class="ci">${item.icon}</span>
      <span class="cn">${item.name}</span>
      <button class="qb" onclick="changeQty(${item.id},-1)">−</button>
      <span class="qn">${item.qty}</span>
      <button class="qb" onclick="changeQty(${item.id}, 1)">+</button>
      <span class="cs">${fmt(item.price*item.qty)}</span>
    </div>`).join('');

  if(p.vergabe>0) html+=`
    <div class="cart-row">
      <span class="ci">🪙</span>
      <span class="cn" style="font-size:14px">Pfandvergabe (+1.00 €)</span>
      <button class="qb" onclick="changePfand('vergabe',-1)">−</button>
      <span class="qn">${p.vergabe}</span>
      <button class="qb" onclick="changePfand('vergabe',1)">+</button>
      <span class="pfand-cs-pos">+${fmt(p.vergabe*PFAND_PRICE)}</span>
    </div>`;

  if(p.rueckgabe>0) html+=`
    <div class="cart-row">
      <span class="ci">🔄</span>
      <span class="cn" style="font-size:14px">Pfandrückgabe (-1.00 €)</span>
      <button class="qb" onclick="changePfand('rueckgabe',-1)">−</button>
      <span class="qn">${p.rueckgabe}</span>
      <button class="qb" onclick="changePfand('rueckgabe',1)">+</button>
      <span class="pfand-cs-neg">-${fmt(p.rueckgabe*PFAND_PRICE)}</span>
    </div>`;

  el.innerHTML=html;
}

/* ── numpad ── */
function npKey(k){
  if(k==='.'&&npRaw.includes('.')) return;
  const p=npRaw.split('.'); if(p[1]&&p[1].length>=2) return;
  if(npRaw===''&&k==='.'){ npRaw='0.'; updateDisplay(); return; }
  npRaw+=k; updateDisplay();
}
function npDel(){ npRaw=npRaw.slice(0,-1); updateDisplay(); }
function setBill(b){
  npRaw=String(b);
  [5,10,20,50].forEach(x=>document.getElementById('bill-'+x)?.classList.toggle('sel',x===b));
  updateDisplay();
}
function updateDisplay(){
  const total=getTotal(), given=parseFloat(npRaw)||0, change=given-total;
  document.getElementById('given-val').textContent=npRaw?fmt(given):'0,00 €';
  const cv=document.getElementById('change-val');
  if(npRaw&&given>0){
    cv.textContent=fmt(Math.max(change,0));
    cv.style.color=change>=0?'var(--green)':'var(--red)';
  }else{cv.textContent='0,00 €'; cv.style.color='var(--text3)';}
  // de-highlight bills if manually typed
  const exact=[5,10,20,50].includes(given)&&npRaw===String(given);
  [5,10,20,50].forEach(x=>{ const btn=document.getElementById('bill-'+x); if(btn&&!exact) btn.classList.remove('sel'); });
}

/* ── payment ── */
async function pay(method){
  const cart=carts[floor]||[], p=pfands[floor], total=getTotal();
  const hasAnything=cart.length>0||p.vergabe>0||p.rueckgabe>0;
  if(!hasAnything) return;
  const given=parseFloat(npRaw)||0;
  if(method==='Bargeld'&&npRaw!==''&&given<total){toast('⚠️ Betrag reicht nicht aus');return;}
  const pfandItems=[];
  if(p.vergabe>0)   pfandItems.push({id:'pfand-v',name:'Pfandvergabe',  price:PFAND_PRICE, qty:p.vergabe,   icon:'🪙'});
  if(p.rueckgabe>0) pfandItems.push({id:'pfand-r',name:'Pfandrückgabe', price:-PFAND_PRICE,qty:p.rueckgabe, icon:'🔄'});
  const allItems=[...cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty,icon:i.icon})),...pfandItems];
  try{
    await api('/api/transactions',{method:'POST',body:JSON.stringify({
      floor_id:floor,total,method,items:allItems
    })});
    clearCart();
    toast((method==='Bargeld'?'💶':'🅿️')+' Zahlung erfasst ✓');
  }catch(e){toast('Fehler: '+e.message);}
}

/* ── stats ── */
async function loadStats(){
  const wrap=document.getElementById('stats-wrap');
  wrap.innerHTML='<p style="color:var(--text3);font-size:15px">Laden…</p>';
  try{
    const [stats,txs,prods]=await Promise.all([api('/api/stats'),api('/api/transactions'),api('/api/stats/products')]);
    const fs=await Promise.all(Object.values(FLOORS).map(f=>api('/api/stats?floor='+f.id).then(s=>({...f,...s}))));
    const buckets={};
    txs.forEach(t=>{ const b=(t.created_at||'').slice(11,16); if(b) buckets[b]=(buckets[b]||0)+t.total; });
    const bKeys=Object.keys(buckets).sort(), bMax=Math.max(...Object.values(buckets),1);

    let h=`<div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Gesamtumsatz</div><div class="kpi-val">${fmt(stats.total)}</div><div class="kpi-sub">${stats.count} Transaktionen</div></div>
      <div class="kpi"><div class="kpi-lbl">Ø pro Bon</div><div class="kpi-val">${fmt(stats.count?stats.total/stats.count:0)}</div></div>
      <div class="kpi"><div class="kpi-lbl">💵 Bargeld</div><div class="kpi-val">${fmt(stats.cash)}</div></div>
      <div class="kpi"><div class="kpi-lbl">🅿️ PayPal</div><div class="kpi-val">${fmt(stats.paypal)}</div></div>
    </div>`;

    if(bKeys.length){
      h+=`<div class="chart-box"><div class="chart-title">Umsatz über den Abend</div><div class="mini-chart">`;
      bKeys.forEach(k=>{const ht=Math.max((buckets[k]/bMax)*50,4); h+=`<div class="mc-col"><div class="mc-bar" style="background:var(--accent);height:${ht}px"></div><span class="mc-lbl">${k}</span></div>`;});
      h+='</div></div>';
    }

    h+='<div class="sec">Umsatz pro Bar</div>';
    fs.forEach(f=>{
      const pct=stats.total>0?Math.round(f.total/stats.total*100):0;
      h+=`<div class="floor-row">
        <div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">${f.emoji}</span>
          <div><div style="font-size:15px;font-weight:700">${f.name}</div><div style="font-size:12px;color:var(--text3)">${f.count} Transaktionen</div></div></div>
        <div style="text-align:right"><div style="font-size:20px;font-weight:900;color:${f.color}">${fmt(f.total)}</div><div style="font-size:12px;color:var(--text3)">${pct}%</div></div>
      </div>`;
    });

    if(prods.length){
      h+='<div class="sec">🏆 Produktranking</div><div class="rank-card">';
      const maxQ=prods[0].qty||1;
      prods.forEach((p,i)=>{
        h+=`<div class="rank-item">
          <div class="rank-top">
            <div class="rank-left"><span class="rank-n">#${i+1}</span><span style="font-size:22px">${p.icon}</span><span style="font-size:14px;font-weight:700">${p.name}</span></div>
            <div><span style="font-size:15px;font-weight:800">${p.qty}×</span><span style="font-size:12px;color:var(--text3);margin-left:7px">${fmt(p.revenue)}</span></div>
          </div>
          <div class="rank-bg"><div class="rank-bar" style="background:${CHART_COLORS[i%CHART_COLORS.length]};width:${(p.qty/maxQ*100).toFixed(1)}%"></div></div>
        </div>`;
      });
      h+='</div>';

      if(bKeys.length){
        h+='<div class="sec">Verkäufe pro Produkt über den Abend</div>';
        prods.slice(0,8).forEach((p,idx)=>{
          const pb={};
          txs.forEach(t=>{const b=(t.created_at||'').slice(11,16);const it=(t.items||[]).find(i=>i.id===p.id);if(it&&b)pb[b]=(pb[b]||0)+it.qty;});
          const pm=Math.max(...bKeys.map(k=>pb[k]||0),1);
          h+=`<div class="prod-chart"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:20px">${p.icon}</span><span style="font-size:14px;font-weight:700">${p.name}</span><span style="font-size:12px;color:var(--text3);margin-left:auto">${p.qty}× · ${fmt(p.revenue)}</span></div><div class="mini-chart">`;
          bKeys.forEach(k=>{const v=pb[k]||0;const ht=v>0?Math.max((v/pm)*50,4):0;h+=`<div class="mc-col"><div class="mc-bar" style="background:${CHART_COLORS[idx%CHART_COLORS.length]};height:${ht}px"></div><span class="mc-lbl">${k}</span></div>`;});
          h+='</div></div>';
        });
      }
    }
    if(!txs.length) h+='<p style="color:var(--text3);font-size:14px;text-align:center;padding:32px">Noch keine Transaktionen heute</p>';
    h+=`<button class="reset-stat" onclick="tagesabschluss()">Tagesabschluss durchführen</button>`;
    wrap.innerHTML=h;
  }catch(e){wrap.innerHTML='<p style="color:var(--red);font-size:14px;padding:20px">Fehler beim Laden</p>';}
}

async function tagesabschluss(){
  requirePin(async()=>{
    if(!confirm('Alle heutigen Transaktionen löschen?')) return;
    try{
      const r=await api('/api/transactions/today',{method:'DELETE',body:JSON.stringify({pin:pinVal})});
      if(r.ok){toast('Tagesabschluss ✓');loadStats();}else toast('Fehler: '+r.error);
    }catch(e){toast('Fehler: '+e.message);}
  });
}

/* ── admin ── */
async function loadAdmin(){
  const wrap=document.getElementById('admin-wrap');
  wrap.innerHTML='<p style="color:var(--text3);font-size:15px">Laden…</p>';
  await loadAllProducts();
  let h='';
  Object.values(FLOORS).forEach(f=>{
    const prods=products[f.id]||[];
    h+=`<div class="admin-sec">
      <div class="admin-title">${f.emoji} ${f.name}</div>
      <div class="admin-form">
        <input class="fw" type="text"   id="an-${f.id}" placeholder="Produktname"/>
        <input class="fn" type="number" id="ap-${f.id}" placeholder="Preis €" step="0.01" min="0"/>
        <input class="fi" type="text"   id="ai-${f.id}" placeholder="🍺" maxlength="2"/>
        <input class="fw" type="text"   id="ac-${f.id}" placeholder="Kategorie"/>
        <button class="admin-add" onclick="addProduct('${f.id}')">+ Hinzufügen</button>
      </div>
      <table class="t">
        <thead><tr><th></th><th>Name</th><th>Preis</th><th>Kategorie</th><th></th></tr></thead>
        <tbody>${prods.map(p=>`<tr>
          <td style="font-size:22px">${p.icon}</td>
          <td style="font-weight:600">${p.name}</td>
          <td>${fmt(p.price)}</td>
          <td><span class="ctag">${p.category}</span></td>
          <td><button class="td" onclick="deleteProduct(${p.id})">×</button></td>
        </tr>`).join('')||'<tr><td colspan="5" style="color:var(--text3);padding:12px;font-size:14px">Keine Produkte</td></tr>'}
        </tbody>
      </table>
    </div>`;
  });
  h+=`<div class="admin-sec">
    <div class="admin-title">🔐 Zugangsdaten</div>
    <div class="s-row"><label>Admin-Passwort</label><input type="password" id="s-cpw" placeholder="Aktuelles"/><input type="password" id="s-npw" placeholder="Neues Passwort"/><button class="s-save" onclick="changePassword()">Speichern</button></div>
    <div class="s-row"><label>Kassierer-PIN</label><input type="password" id="s-cpw2" placeholder="Admin-Passwort"/><input type="text" id="s-npin" placeholder="Neuer PIN (4–8 Ziffern)" maxlength="8" inputmode="numeric"/><button class="s-save" onclick="changePin()">Speichern</button></div>
  </div>`;
  wrap.innerHTML=h;
}

async function addProduct(fid){
  const name=document.getElementById('an-'+fid)?.value.trim();
  const price=parseFloat(document.getElementById('ap-'+fid)?.value);
  const icon=document.getElementById('ai-'+fid)?.value.trim()||'📦';
  const cat=document.getElementById('ac-'+fid)?.value.trim();
  if(!name||isNaN(price)||!cat){toast('Bitte alle Felder ausfüllen');return;}
  try{
    await api('/api/products',{method:'POST',body:JSON.stringify({floor_id:fid,name,price,category:cat,icon,adminPassword:adminPwCache})});
    toast('Produkt hinzugefügt ✓'); await loadAllProducts(); loadAdmin();
    if(floor===fid){renderCats();renderProducts();}
  }catch(e){toast('Fehler: '+e.message);}
}

async function deleteProduct(id){
  if(!confirm('Produkt löschen?')) return;
  try{
    await api('/api/products/'+id,{method:'DELETE',body:JSON.stringify({adminPassword:adminPwCache})});
    toast('Gelöscht'); await loadAllProducts(); loadAdmin();
    renderCats(); renderProducts();
  }catch(e){toast('Fehler: '+e.message);}
}

async function changePassword(){
  const c=document.getElementById('s-cpw')?.value, n=document.getElementById('s-npw')?.value;
  if(!c||!n){toast('Felder ausfüllen');return;}
  try{const r=await api('/api/auth/change-password',{method:'POST',body:JSON.stringify({adminPassword:c,newPassword:n})});r.ok?(adminPwCache=n,toast('Passwort geändert ✓')):toast('Fehler: '+r.error);}catch{toast('Fehler');}
}
async function changePin(){
  const c=document.getElementById('s-cpw2')?.value, p=document.getElementById('s-npin')?.value;
  if(!c||!p){toast('Felder ausfüllen');return;}
  try{const r=await api('/api/auth/change-pin',{method:'POST',body:JSON.stringify({adminPassword:c,newPin:p})});r.ok?(pinUnlocked=false,toast('PIN geändert ✓')):toast('Fehler: '+r.error);}catch{toast('Fehler');}
}

/* ── portrait tabs ── */
function switchPortraitTab(tab){
  document.getElementById('ptab-products')?.classList.toggle('active', tab==='products');
  document.getElementById('ptab-cart')?.classList.toggle('active', tab==='cart');
  document.querySelector('.left')?.classList.toggle('ptab-active', tab==='products');
  document.querySelector('.right')?.classList.toggle('ptab-active', tab==='cart');
}

/* ── PIN ── */
function requirePin(cb){
  if(pinUnlocked){cb();return;}
  pinCb=cb; pinVal='';
  document.getElementById('pin-err').textContent='';
  renderPinDots();
  document.getElementById('pin-overlay').classList.add('show');
}
function closePinOverlay(){document.getElementById('pin-overlay').classList.remove('show');pinVal='';}
function renderPinDots(){
  document.getElementById('pin-dots').innerHTML=Array.from({length:4},(_,i)=>`<div class="pin-dot${i<pinVal.length?' on':''}"></div>`).join('');
}
function pinKey(k){if(pinVal.length>=8)return;pinVal+=k;renderPinDots();if(pinVal.length>=4)setTimeout(submitPin,300);}
function pinDel(){pinVal=pinVal.slice(0,-1);renderPinDots();}
async function submitPin(){
  try{
    const{ok}=await api('/api/auth/pin',{method:'POST',body:JSON.stringify({pin:pinVal})});
    if(ok){pinUnlocked=true;closePinOverlay();if(pinCb){pinCb();pinCb=null;}}
    else{document.getElementById('pin-err').textContent='Falscher PIN';pinVal='';renderPinDots();setTimeout(()=>document.getElementById('pin-err').textContent='',1500);}
  }catch{toast('Verbindungsfehler');pinVal='';renderPinDots();}
}

/* ── ADMIN OVERLAY ── */
function requireAdmin(){
  if(adminUnlocked){showScreen('admin');return;}
  document.getElementById('admin-pw').value='';
  document.getElementById('admin-err').textContent='';
  document.getElementById('admin-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('admin-pw').focus(),100);
}
function closeAdminOverlay(){document.getElementById('admin-overlay').classList.remove('show');}
async function submitAdminPw(){
  const pw=document.getElementById('admin-pw').value;
  try{
    const{ok}=await api('/api/auth/admin',{method:'POST',body:JSON.stringify({password:pw})});
    if(ok){adminUnlocked=true;adminPwCache=pw;closeAdminOverlay();showScreen('admin');}
    else document.getElementById('admin-err').textContent='Falsches Passwort';
  }catch{document.getElementById('admin-err').textContent='Verbindungsfehler';}
}

/* ── WEBSOCKET ── */
function connectWS(){
  const ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
  ws.onopen=()=>setConn(true);
  ws.onclose=()=>{setConn(false);setTimeout(connectWS,3000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{
    const{event}=JSON.parse(e.data);
    const d=document.getElementById('conn-dot');
    d.style.transform='scale(1.8)';setTimeout(()=>d.style.transform='',400);
    if(event==='transaction'&&document.getElementById('screen-stats').classList.contains('active')) loadStats();
    if(event==='products_changed'){loadAllProducts().then(()=>{renderCats();renderProducts();});}
    if(event==='reset'&&document.getElementById('screen-stats').classList.contains('active')) loadStats();
  };
}

/* ── FULLSCREEN ── */
function updateFsBtn(){
  const btn=document.getElementById('btn-fs');
  if(!btn) return;
  btn.textContent=document.fullscreenElement?'✕⛶':'⛶';
  btn.title=document.fullscreenElement?'Vollbild beenden':'Vollbild';
}

async function tryFullscreen(){
  try{
    await document.documentElement.requestFullscreen({navigationUI:'hide'});
    await screen.orientation?.lock?.('portrait').catch(()=>{});
  }catch(e){}
  updateFsBtn();
}

function exitFullscreen(){
  document.exitFullscreen?.().catch(()=>{});
}

function toggleFullscreen(){
  if(document.fullscreenElement) exitFullscreen();
  else tryFullscreen();
}

document.addEventListener('fullscreenchange', updateFsBtn);

// Auto-trigger fullscreen on the very first user touch or click
(function(){
  let done=false;
  function onFirst(e){
    if(done||document.fullscreenElement) return;
    done=true;
    tryFullscreen();
    document.removeEventListener('touchstart',onFirst,true);
    document.removeEventListener('click',onFirst,true);
  }
  document.addEventListener('touchstart',onFirst,{capture:true,once:true});
  document.addEventListener('click',onFirst,{capture:true,once:true});
})();

/* ── BOOT ── */
(async()=>{await loadAllProducts();switchFloor('keller');switchPortraitTab('products');connectWS();})();
</script>
